<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Веб-калькулятор | История вычислений</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-container">

    <div class="calculator">
        <div class="calculator-header">
            <h1>🧮 Калькулятор</h1>
            <button class="clear-history-btn" id="clearHistoryBtn" title="Очистить историю">🗑️</button>
        </div>

        <div class="display">
            <div class="expression" id="expression">0</div>
            <div class="result" id="result">= 0</div>
        </div>

        <div class="buttons">
            <button class="btn btn-clear" data-action="clear">AC</button>
            <button class="btn btn-clear" data-action="delete">⌫</button>
            <button class="btn btn-operator" data-op="%">%</button>
            <button class="btn btn-operator" data-op="/">÷</button>

            <button class="btn btn-number" data-num="7">7</button>
            <button class="btn btn-number" data-num="8">8</button>
            <button class="btn btn-number" data-num="9">9</button>
            <button class="btn btn-operator" data-op="*">×</button>

            <button class="btn btn-number" data-num="4">4</button>
            <button class="btn btn-number" data-num="5">5</button>
            <button class="btn btn-number" data-num="6">6</button>
            <button class="btn btn-operator" data-op="-">-</button>

            <button class="btn btn-number" data-num="1">1</button>
            <button class="btn btn-number" data-num="2">2</button>
            <button class="btn btn-number" data-num="3">3</button>
            <button class="btn btn-operator" data-op="+">+</button>

            <button class="btn btn-number" data-num="0">0</button>
            <button class="btn btn-number" data-num=".">.</button>
            <button class="btn btn-operator" data-op="^">xʸ</button>
            <button class="btn btn-equals" data-action="equals">=</button>
        </div>

        <div class="memory-bar">
            <button class="btn-memory" id="saveToMemoryBtn">💾 Сохранить в память</button>
            <button class="btn-memory" id="recallMemoryBtn">📋 Восстановить из памяти</button>
            <span class="memory-indicator" id="memoryIndicator">Память пуста</span>
        </div>
    </div>

    <div class="history-panel">
        <div class="history-header">
            <h2>История вычислений</h2>
            <button class="clear-log-btn" id="clearLogBtn">Очистить всё</button>
        </div>
        <div class="history-list" id="historyList">
            <div class="history-empty">Нет сохранённых вычислений</div>
        </div>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
